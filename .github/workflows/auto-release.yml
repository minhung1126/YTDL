name: "Auto Release"

on:
  # Trigger on tag push
  push:
    tags:
      - "v*"
  # Allow manual trigger
  workflow_dispatch:

jobs:
  auto-release:
    name: "Auto Release"
    runs-on: "ubuntu-latest"

    permissions:
      contents: write

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Extract version info"
        id: version_extractor
        shell: bash
        run: |
          VERSION=$(grep '^__version__' YTDL.py | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: "Package Source Code"
        if: steps.version_extractor.outputs.version != 'dev'
        run: |
          zip "YTDL.${{ steps.version_extractor.outputs.version }}.zip" YTDL.py YTDL_mul.py

      - name: "Prepare release notes"
        if: steps.version_extractor.outputs.version != 'dev'
        run: |
          echo 'é»žé–‹ `Assets` ä¸¦ä¸‹è¼‰ `YTDL.${{ steps.version_extractor.outputs.version }}.zip`ï¼ˆåŽŸå§‹ç¢¼ï¼‰ã€‚' > release_notes.md

      - name: "Create Release"
        if: steps.version_extractor.outputs.version != 'dev'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create ${{ steps.version_extractor.outputs.version }} \
            "YTDL.${{ steps.version_extractor.outputs.version }}.zip" \
            --title "Release ${{ steps.version_extractor.outputs.version }}" \
            --notes-file "release_notes.md" \
            --generate-notes
